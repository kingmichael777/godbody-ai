<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godbody AI — Owner Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #080a0f;
            color: #f0f2f7;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200, 169, 110, 0.1), transparent 60%);
            pointer-events: none
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 400px;
            padding: 48px 40px;
            background: #0e1118;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5)
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 32px
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #c8a96e, #7c6bde);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 18px;
            color: #fff
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 20px
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #8b90a0;
            margin-bottom: 32px
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            background: rgba(200, 169, 110, 0.1);
            border: 1px solid rgba(200, 169, 110, 0.25);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            color: #c8a96e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 auto 24px;
            display: block;
            width: fit-content
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #8b90a0;
            text-transform: uppercase;
            letter-spacing: .7px;
            margin-bottom: 6px
        }

        input[type=password] {
            width: 100%;
            padding: 12px 14px;
            background: #131720;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #f0f2f7;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color .2s;
            margin-bottom: 20px
        }

        input[type=password]:focus {
            border-color: rgba(200, 169, 110, 0.4)
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c8a96e, #b8944a);
            border: none;
            border-radius: 10px;
            color: #0a0807;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: all .2s
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(200, 169, 110, 0.3)
        }

        button:disabled {
            opacity: .5;
            cursor: not-allowed
        }

        .error {
            display: none;
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(240, 128, 128, 0.08);
            border: 1px solid rgba(240, 128, 128, 0.2);
            border-radius: 7px;
            font-size: 13px;
            color: #f08080;
            text-align: center
        }

        .error.show {
            display: block
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <div class="logo-mark">N</div><span class="logo-text">Godbody AI</span>
        </div>
        <div class="badge">⚡ Owner Access</div>
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in with your owner password to access unlimited generations.</p>
        <form id="loginForm">
            <label>Owner Password</label>
            <input type="password" id="passwordInput" placeholder="Enter your owner password"
                autocomplete="current-password" required />
            <button type="submit" id="loginBtn">Sign In as Owner</button>
            <div class="error" id="errorMsg">Incorrect password. Please try again.</div>
        </form>
    </div>

    <script>
        const BACKEND = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:3001' : 'https://godbody-ai-production.up.railway.app';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            err.classList.remove('show');

            try {
                const res = await fetch(`${BACKEND}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }),
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Login failed');

                // Store admin session
                localStorage.setItem('noor_user_id', data.userId);
                localStorage.setItem('noor_plan', data.plan);
                localStorage.setItem('noor_is_admin', 'true');

                // Redirect to hub
                window.location.href = 'index.html';
            } catch (err2) {
                document.getElementById('errorMsg').classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Sign In as Owner';
            }
        });

        // If already logged in as admin, go straight to hub
        if (localStorage.getItem('noor_is_admin') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
